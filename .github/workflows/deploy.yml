name: Build, Push, and Deploy with Kamal

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Ruby (Required to execute Kamal)
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundle-cache: true

      # 3. Install Kamal tool
      - name: Install Kamal
        run: gem install kamal -v 2.4.0

      # 4. Configure SSH access to the remote server
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Step 5: Log in to GHCR (Satisfies Kamal's local verification check)
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_ACCESS_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 6.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7: Build and Push the image using Docker Buildx
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Kamal expects lowercase image paths. Enforce lowercase strings if needed.
          tags: ghcr.io/lazylester/bonkers:${{ github.sha }}
          # CRUCIAL FIX: Inject the tracking metadata Kamal demands to orchestrate your app
          labels: |
            service=bonkers
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Run Kamal Deploy
      - name: Run Kamal Deploy
        env:
          GHCR_ACCESS_TOKEN: ${{ secrets.GHCR_ACCESS_TOKEN }}
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          RAILS_MASTER_KEY_PRODUCTION: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}

        run: |
          mkdir -p ~/.ssh
          ssh-keyscan $DEPLOY_SERVER_IP >> ~/.ssh/known_hosts

          mkdir -p .kamal

          # Writing variables using a Heredoc preserves the raw string lengths perfectly
          cat <<-EOF > .kamal/secrets
          GHCR_ACCESS_TOKEN=$GHCR_ACCESS_TOKEN
          RAILS_MASTER_KEY=$RAILS_MASTER_KEY
          RAILS_MASTER_KEY_PRODUCTION=$RAILS_MASTER_KEY
          SECRET_KEY_BASE=$SECRET_KEY_BASE
          EOF

          kamal redeploy --version="${{ github.sha }}"
